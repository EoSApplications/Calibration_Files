name: Sync calibration data to Development
# After a calibration change merges to main, keeps Development current
# automatically, with zero local steps, in two sequential jobs:
#
#   1. mirror-calibration-files: mirrors this repo's .yaml files into
#      Development's staged EoSAlign copy and pushes that alone.
#   2. rebuild-website (needs job 1): runs Development's own full local
#      website-build pipeline (Website_Files/Update_Gh_Pages_Staging.py) -
#      including Build_Calibration_Graph.py, the fragile PySide6-dependent
#      step - and pushes everything it touches.
#
# Split into two jobs, rather than one, specifically so a failure in the
# heavier, more fragile job 2 (a future Qt/PySide6 dependency hiccup, say)
# never blocks job 1's simple, near-impossible-to-fail file mirror from
# landing. `needs:` makes job 2 wait for job 1 to finish (and push) before
# it even starts, so job 2's checkout of Development naturally picks up
# job 1's already-landed commit with no push race between them - this is
# why it's two jobs in one workflow file rather than two separate workflow
# files, which would run in parallel by default and risk exactly that race.
#
# Development_Tools/Refresh_Staged_EoSAlign_Calibration_Mirror.py and its
# post-merge hook used to do all of this locally (only when someone
# remembered to `git pull` the Calibration_Files sibling clone); both were
# deleted once this workflow replaced them. See Sync_To_Website.yml's own
# comments for the fuller history.
#
# Job 2 checks out this repo a second time at a sibling path to
# Development, matching Website_Files/Build/Sync_Pyodide_Packages.py's own
# REPO_ROOT.parent / "Calibration_Files" assumption - that script expects
# the real Calibration_Files repo to sit next to Development on disk, same
# as it does on a real dev machine.
#
# Both jobs push directly to Development's main (not a PR) - Development is
# a private solo working repo, and this is purely a derived-data mirror +
# rebuild, not authored content, matching Sync_To_Website.yml's same
# reasoning.
#
# Needs a DEVELOPMENT_SYNC_TOKEN secret: a fine-grained PAT scoped to the
# Development repo only, with Contents: Read & Write. Development is private, so
# unlike EoSAlign/Website this token is also required just to check it out, not
# only to push - same setup pattern as EOSALIGN_SYNC_TOKEN otherwise.

on:
  push:
    branches: [main]
    paths:
      - '*.yaml'

jobs:
  mirror-calibration-files:
    runs-on: ubuntu-latest
    steps:
      - name: Check out Calibration_Files (this repo)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: Calibration_Files

      - name: Check out Development (private repo)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: EoSApplications/Development
          token: ${{ secrets.DEVELOPMENT_SYNC_TOKEN }}
          path: Development

      - name: Mirror changed calibration files into Development's staged EoSAlign copy
        run: |
          set -euo pipefail
          DEST="Development/Staged__Public_Repositories/EoSAlign/Code/Calibration_Files"
          mkdir -p "$DEST"
          cp Calibration_Files/*.yaml "$DEST"/
          for existing in "$DEST"/*.yaml; do
            name="$(basename "$existing")"
            if [ ! -f "Calibration_Files/$name" ]; then
              rm "$existing"
            fi
          done

      - name: Commit and push, if anything changed
        run: |
          set -euo pipefail
          cd Development
          git config user.name "Heidi Krauss"
          git config user.email "Heidi.N.Krauss@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "Sync calibration files from Calibration_Files@${{ github.sha }} [Staging Change Acknowledged]"
          git push origin main

  rebuild-website:
    needs: mirror-calibration-files
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out Calibration_Files (this repo, at a path sibling to Development)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: Calibration_Files

      - name: Check out Development (private repo, already has job 1's mirror commit)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: EoSApplications/Development
          token: ${{ secrets.DEVELOPMENT_SYNC_TOKEN }}
          path: Development

      - name: Install system libraries PySide6 needs even for headless imports
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libopengl0 libxkbcommon0 libxkbcommon-x11-0 \
            libdbus-1-3 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb1 libx11-xcb1 libxrender1 \
            libxi6 libsm6 libnss3

      - name: Install the desktop app's Python dependencies (needed by Build_Calibration_Graph.py)
        run: |
          python3 -m pip install --no-input \
            "PySide6>=6.9.3" "numpy>=1.26.4" "pandas>=2.3.3" "matplotlib>=3.9.2" \
            "pillow>=11.3.0" "scipy>=1.15.2" "networkx>=3.4.2" "plotly>=6.8.0" \
            "pyyaml>=6.0.3" "darkdetect>=0.8.0"

      - name: Run Development's full local website-build pipeline
        working-directory: Development
        run: python3 Website_Files/Update_Gh_Pages_Staging.py

      - name: Commit and push, if anything changed
        run: |
          set -euo pipefail
          cd Development
          git config user.name "Heidi Krauss"
          git config user.email "Heidi.N.Krauss@gmail.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
            exit 0
          fi
          git commit -m "Rebuild website build output from Calibration_Files@${{ github.sha }} [Staging Change Acknowledged]"
          git push origin main
